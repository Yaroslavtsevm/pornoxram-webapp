<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PX • Menu</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #000; color: #fff; }
    .tab-active { background: linear-gradient(90deg, #f97316, #ec4899) !important; color: white !important; }
    .card { transition: all 0.3s ease; }
    .card:hover { transform: scale(1.05); }
  </style>
</head>
<body class="min-h-screen pb-24">

  <!-- Header -->
  <div class="bg-black pt-6 pb-4 px-4 flex items-center justify-between border-b border-zinc-800">
    <div class="flex items-center gap-3">
      <div class="w-12 h-12 bg-gradient-to-br from-orange-500 to-pink-500 rounded-3xl flex items-center justify-center text-4xl shadow-lg">🔥</div>
      <h1 class="text-5xl font-black tracking-tighter bg-gradient-to-r from-orange-400 to-pink-400 bg-clip-text text-transparent">PX</h1>
    </div>
    <button onclick="toggleLanguage()" id="langBtn" 
            class="bg-zinc-900 hover:bg-zinc-800 px-6 py-3 rounded-3xl text-sm font-medium">🇷🇺 RU</button>
  </div>

  <!-- Tabs -->
  <div class="px-4 pt-6">
    <div class="flex bg-zinc-900 rounded-3xl p-1.5">
      <button onclick="switchTab(0)" id="tab0" class="tab flex-1 py-4 rounded-3xl font-semibold tab-active">🌟 Звезды</button>
      <button onclick="switchTab(1)" id="tab1" class="tab flex-1 py-4 rounded-3xl font-semibold">📂 Категории</button>
      <button onclick="switchTab(2)" id="tab2" class="tab flex-1 py-4 rounded-3xl font-semibold">💰 Платное</button>
      <button onclick="switchTab(3)" id="tab3" class="tab hidden flex-1 py-4 rounded-3xl font-semibold">⚙️ Админ</button>
    </div>
  </div>

  <!-- Content -->
  <div class="p-4" id="mainContent">
    <!-- Будет заполняться динамически -->
  </div>

  <!-- Sponsor Button -->
  <div class="fixed bottom-0 left-0 right-0 bg-zinc-950 border-t border-zinc-800 p-4">
    <button onclick="sponsor()" 
            class="w-full py-6 bg-gradient-to-r from-pink-500 to-rose-500 rounded-3xl font-bold text-xl shadow-2xl flex items-center justify-center gap-2">
      ❤️ Спонсировать (Stars)
    </button>
  </div>

  <script>
    let currentTab = 0;
    let lang = localStorage.getItem('pxLang') || 'ru';
    const ADMIN_ID = 1423028519;

    const translations = {
      ru: { stars: "Звезды", cats: "Категории", paid: "Платное", admin: "Админ" },
      en: { stars: "Stars",   cats: "Categories", paid: "Paid",   admin: "Admin" }
    };

    function t(key) {
      return translations[lang][key] || key;
    }

    function updateLangUI() {
      document.getElementById('langBtn').innerHTML = lang === 'ru' ? '🇷🇺 RU' : '🇬🇧 EN';
    }

    function toggleLanguage() {
      lang = lang === 'ru' ? 'en' : 'ru';
      localStorage.setItem('pxLang', lang);
      updateLangUI();
    }

    async function apiPost(endpoint, body = {}) {
      const token = Telegram.WebApp.initData;
      const res = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({ ...body, _auth: token })
      });
      return await res.json();
    }

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach((el, i) => {
        el.classList.toggle('tab-active', i === tab);
      });

      if (tab === 3) {
        renderAdminPanel();
      } else {
        document.getElementById('mainContent').innerHTML = `<p class="text-center py-20 text-zinc-400">Загрузка...</p>`;
        loadContent(tab);
      }
    }

    async function loadContent(tab) {
      let data = [];
      if (tab === 0) data = await apiPost('/api/stars');
      else if (tab === 1) data = await apiPost('/api/categories');
      else if (tab === 2) data = await apiPost('/api/paid');

      const container = document.getElementById('mainContent');
      container.innerHTML = '';

      if (tab === 0) {
        container.innerHTML = data.map(item => `
          <div class="bg-zinc-900 rounded-3xl overflow-hidden mb-4 cursor-pointer" onclick="alert('Звезда: ${item.name}')">
            <img src="${item.photo_url || 'https://picsum.photos/id/1015/600/600'}" class="w-full h-48 object-cover">
            <div class="p-4">
              <p class="font-semibold text-lg">${item.name}</p>
            </div>
          </div>
        `).join('');
      } else if (tab === 1) {
        container.innerHTML = data.map(item => `
          <div class="bg-zinc-900 rounded-3xl p-8 text-center text-xl font-medium cursor-pointer" onclick="alert('Категория: ${item.name}')">
            ${item.name}
          </div>
        `).join('');
      } else if (tab === 2) {
        container.innerHTML = `<p class="text-center py-20">Платный контент скоро будет доступен</p>`;
      }
    }

    function renderAdminPanel() {
      document.getElementById('mainContent').innerHTML = `
        <div class="bg-zinc-900 rounded-3xl p-8 text-center">
          <h2 class="text-3xl font-bold mb-6">⚙️ Админ-панель</h2>
          <p class="mb-8 text-zinc-400">Добро пожаловать, хозяин</p>
          <button onclick="alert('Функция добавления звезды и категорий будет добавлена в следующей версии')" 
                  class="w-full py-6 bg-gradient-to-r from-purple-500 to-pink-500 rounded-3xl font-bold text-xl mb-4">
            Добавить контент
          </button>
        </div>`;
    }

    function sponsor() {
      Telegram.WebApp.openTelegramLink("https://t.me/PX_MrM");
    }

    // Запуск
    window.onload = () => {
      if (typeof Telegram === 'undefined' || !Telegram.WebApp) {
        console.error("Telegram WebApp not loaded");
        return;
      }

      Telegram.WebApp.ready();
      Telegram.WebApp.expand();

      // Проверка админа
      const user = Telegram.WebApp.initDataUnsafe?.user;
      if (user && (user.id === ADMIN_ID || user.username === "PX_MrM")) {
        document.getElementById('tab3').classList.remove('hidden');
      }

      updateLangUI();
      switchTab(0);
    };
  </script>
</body>
</html>
