<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PX</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #000; color: white; }
    .tab-active { background: linear-gradient(to right, #f97316, #ec4899); color: white; }
  </style>
</head>
<body class="min-h-screen">

  <div class="max-w-2xl mx-auto p-4">
    <div class="flex justify-between items-center mb-6">
      <div class="flex items-center gap-3">
        <div class="w-12 h-12 bg-gradient-to-br from-orange-500 to-pink-500 rounded-2xl flex items-center justify-center text-4xl">🔥</div>
        <h1 class="text-5xl font-black">PX</h1>
      </div>
      <button onclick="toggleLang()" id="langBtn" class="bg-zinc-800 px-6 py-3 rounded-3xl">🇷🇺 RU</button>
    </div>

    <div class="flex bg-zinc-900 rounded-3xl p-1 mb-8">
      <button onclick="switchTab(0)" id="tab0" class="tab flex-1 py-4 rounded-3xl tab-active">🌟 Звезды</button>
      <button onclick="switchTab(1)" id="tab1" class="tab flex-1 py-4 rounded-3xl">📂 Категории</button>
      <button onclick="switchTab(2)" id="tab2" class="tab flex-1 py-4 rounded-3xl">💰 Платное</button>
      <button onclick="switchTab(3)" id="tab3" class="tab hidden flex-1 py-4 rounded-3xl">⚙️ Админ</button>
    </div>

    <div id="content" class="min-h-[400px]"></div>
  </div>

  <div class="fixed bottom-4 left-4 right-4">
    <button onclick="sponsor()" class="w-full py-5 bg-gradient-to-r from-pink-500 to-rose-500 rounded-3xl font-bold text-xl">
      ❤️ Спонсировать
    </button>
  </div>

  <script>
    let lang = 'ru';
    const ADMIN_ID = 1423028519;

    function toggleLang() {
      lang = lang === 'ru' ? 'en' : 'ru';
      document.getElementById('langBtn').textContent = lang === 'ru' ? '🇷🇺 RU' : '🇬🇧 EN';
    }

    function sponsor() {
      Telegram.WebApp.openTelegramLink("https://t.me/PX_MrM");
    }

    async function apiPost(url, body={}) {
      const res = await fetch(url, {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: new URLSearchParams({...body, _auth: Telegram.WebApp.initData})
      });
      return res.json();
    }

    function switchTab(n) {
      document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('tab-active', i===n));
      document.getElementById('content').innerHTML = `<p class="text-center py-20">Загрузка таба ${n}...</p>`;
    }

    window.onload = () => {
      Telegram.WebApp.ready();
      Telegram.WebApp.expand();

      const user = Telegram.WebApp.initDataUnsafe?.user;
      if (user && user.id === ADMIN_ID) {
        document.getElementById('tab3').classList.remove('hidden');
      }

      switchTab(0);
    };
  </script>
</body>
</html>
