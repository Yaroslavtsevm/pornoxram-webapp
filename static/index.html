<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PX Menu</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0a0a0a; color: #fff; font-family: system-ui, -apple-system, sans-serif; }
    .modal { animation: modalPop 0.3s ease; }
    @keyframes modalPop { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    .media-card { transition: all 0.2s; }
    .media-card:hover { transform: scale(1.03); box-shadow: 0 10px 15px -3px rgb(249 115 22); }
  </style>
</head>
<body class="min-h-screen pb-24">

  <div class="max-w-2xl mx-auto p-4">
    <!-- Заголовок -->
    <div class="flex items-center justify-center gap-3 mb-8">
      <div class="w-12 h-12 bg-gradient-to-br from-orange-500 to-pink-500 rounded-2xl flex items-center justify-center text-3xl">🔥</div>
      <h1 class="text-5xl font-bold tracking-tighter text-orange-500">PX</h1>
    </div>

    <!-- Табы -->
    <div class="flex border-b border-zinc-800 mb-6 text-lg">
      <button onclick="switchTab(0)" id="tab0" class="tab flex-1 py-4 font-semibold border-b-4 border-orange-500 text-orange-500">🌟 Звезды</button>
      <button onclick="switchTab(1)" id="tab1" class="tab flex-1 py-4 font-semibold text-zinc-400">📂 Категории</button>
      <button onclick="switchTab(2)" id="tab2" class="tab flex-1 py-4 font-semibold text-zinc-400">💰 Платное</button>
    </div>

    <!-- Поиск (только для звёзд) -->
    <div id="searchContainer" class="mb-6">
      <input id="searchInput" type="text" placeholder="Поиск звезды или хештега..." 
             class="w-full bg-zinc-900 border border-zinc-700 rounded-3xl px-6 py-4 text-lg focus:outline-none focus:border-orange-500"
             onkeyup="if(event.key==='Enter') filterStars()">
    </div>

    <!-- Контент вкладок -->
    <div id="tabContent0" class="tab-content">
      <div id="starsGrid" class="grid grid-cols-2 gap-4"></div>
    </div>
    <div id="tabContent1" class="tab-content hidden">
      <div id="categoriesGrid" class="grid grid-cols-2 gap-4"></div>
    </div>
    <div id="tabContent2" class="tab-content hidden">
      <div id="paidGrid" class="space-y-6"></div>
    </div>
  </div>

  <!-- Модальное окно контента + комментарии -->
  <div id="modal" onclick="if(event.target===this) closeModal()" class="hidden fixed inset-0 bg-black/80 flex items-end lg:items-center justify-center z-50">
    <div onclick="event.stopImmediatePropagation()" class="modal bg-zinc-950 w-full max-w-2xl max-h-[90vh] overflow-y-auto rounded-t-3xl lg:rounded-3xl p-6">
      <div class="flex justify-between items-center mb-6">
        <h2 id="modalTitle" class="text-3xl font-bold"></h2>
        <button onclick="closeModal()" class="text-4xl leading-none text-zinc-400">×</button>
      </div>

      <!-- Медиа -->
      <div id="mediaContainer" class="space-y-8 mb-8"></div>

      <!-- Комментарии -->
      <div class="mb-8">
        <h3 class="text-xl font-semibold mb-4 flex items-center gap-2"><span>💬</span> Анонимные комментарии</h3>
        <div id="commentsList" class="space-y-4 max-h-64 overflow-y-auto mb-6"></div>

        <!-- Форма комментария -->
        <div class="bg-zinc-900 rounded-3xl p-5">
          <input id="nicknameInput" type="text" placeholder="Твой никнейм (анонимно)" 
                 class="w-full bg-transparent border-b border-zinc-700 py-3 text-lg focus:outline-none mb-4">
          <textarea id="commentInput" rows="3" placeholder="Напиши комментарий..." 
                    class="w-full bg-transparent resize-none focus:outline-none text-lg"></textarea>
          <button onclick="sendComment()" 
                  class="mt-4 w-full bg-gradient-to-r from-orange-500 to-pink-500 py-4 rounded-3xl font-bold text-lg active:scale-95 transition">
            Отправить анонимно
          </button>
        </div>
      </div>

      <button onclick="closeModal()" class="w-full py-4 text-zinc-400 font-medium">Закрыть</button>
    </div>
  </div>

  <!-- Нижняя кнопка спонсорства -->
  <div class="fixed bottom-0 left-0 right-0 bg-zinc-950 border-t border-zinc-800 p-4 z-50">
    <button onclick="sponsor()" 
            class="w-full py-5 bg-gradient-to-r from-pink-500 to-orange-500 rounded-3xl font-bold text-2xl shadow-xl shadow-orange-500/30">
      ❤️ Спонсировать канал
    </button>
  </div>

  <script>
    let currentContentId = null;
    let currentTab = 0;

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
      document.getElementById(`tabContent${tab}`).classList.remove('hidden');

      document.querySelectorAll('.tab').forEach(el => el.classList.remove('border-b-4', 'border-orange-500', 'text-orange-500'));
      document.getElementById(`tab${tab}`).classList.add('border-b-4', 'border-orange-500', 'text-orange-500');

      if (tab === 0) document.getElementById('searchContainer').classList.remove('hidden');
      else document.getElementById('searchContainer').classList.add('hidden');

      loadTab(tab);
    }

    async function loadTab(tab) {
      const token = Telegram.WebApp.initData;
      let url = '';
      if (tab === 0) url = '/api/stars';
      else if (tab === 1) url = '/api/categories';
      else if (tab === 2) url = '/api/paid';

      try {
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams({ _auth: token })
        });
        const data = await res.json();

        if (tab === 0) renderStars(data);
        else if (tab === 1) renderCategories(data);
        else if (tab === 2) renderPaid(data);
      } catch (e) { console.error(e); }
    }

    function renderStars(stars) {
      const container = document.getElementById('starsGrid');
      container.innerHTML = stars.map(star => `
        <div onclick="openStar(${star.id}, '${star.name}', '${star.photo_url || ''}', '${star.hashtag || ''}')" 
             class="media-card bg-zinc-900 rounded-3xl overflow-hidden cursor-pointer">
          <img src="${star.photo_url || 'https://picsum.photos/id/1005/600/600'}" class="w-full aspect-square object-cover">
          <div class="p-4">
            <p class="font-semibold text-xl">${star.name}</p>
            ${star.hashtag ? `<p class="text-orange-400 text-sm">${star.hashtag}</p>` : ''}
          </div>
        </div>
      `).join('');
    }

    function renderCategories(cats) {
      const container = document.getElementById('categoriesGrid');
      container.innerHTML = cats.map(cat => `
        <div onclick="openCategory(${cat.id}, '${cat.name}')" 
             class="media-card bg-zinc-900 rounded-3xl p-8 text-center text-2xl font-medium cursor-pointer hover:bg-orange-500/10">
          ${cat.name}
        </div>
      `).join('');
    }

    function renderPaid(items) {
      const container = document.getElementById('paidGrid');
      container.innerHTML = items.map(item => `
        <div onclick="openPaid('${item.type}', '${item.file_id}', '${item.caption || ''}', ${item.id})" class="media-card bg-zinc-900 rounded-3xl overflow-hidden cursor-pointer">
          ${item.type === 'photo' 
            ? `<img src="${item.file_id}" class="w-full">` 
            : `<video src="${item.file_id}" controls class="w-full aspect-video"></video>`}
          <div class="p-5">${item.caption || 'Платное видео'}</div>
        </div>
      `).join('');
    }

    // Открытие звезды
    async function openStar(id, name, photo, hashtag) {
      currentContentId = id;
      document.getElementById('modalTitle').innerHTML = `${name} ${hashtag ? `<span class="text-orange-400 text-xl">${hashtag}</span>` : ''}`;
      
      const container = document.getElementById('mediaContainer');
      container.innerHTML = `
        <div class="rounded-3xl overflow-hidden mb-8">
          <img src="${photo || 'https://picsum.photos/id/1005/800/600'}" class="w-full">
        </div>
        <div class="text-zinc-400 text-center mb-8">Здесь будут фото и видео звезды (расширь API при необходимости)</div>
      `;
      
      await loadComments();
      document.getElementById('modal').classList.remove('hidden');
      Telegram.WebApp.expand();
    }

    // Открытие категории / платного (демо)
    function openCategory(id, name) {
      currentContentId = id;
      document.getElementById('modalTitle').textContent = name;
      document.getElementById('mediaContainer').innerHTML = `<p class="text-center text-zinc-400 py-12">Контент категории (расширь API при необходимости)</p>`;
      loadComments();
      document.getElementById('modal').classList.remove('hidden');
    }

    function openPaid(type, fileId, caption, id) {
      currentContentId = id;
      document.getElementById('modalTitle').textContent = 'Платный контент';
      const container = document.getElementById('mediaContainer');
      container.innerHTML = type === 'photo' 
        ? `<img src="${fileId}" class="w-full rounded-3xl">` 
        : `<video src="${fileId}" controls class="w-full rounded-3xl aspect-video"></video>`;
      loadComments();
      document.getElementById('modal').classList.remove('hidden');
    }

    async function loadComments() {
      const token = Telegram.WebApp.initData;
      try {
        const res = await fetch('/api/comments', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams({ _auth: token, content_id: currentContentId })
        });
        const comments = await res.json();
        
        const list = document.getElementById('commentsList');
        list.innerHTML = comments.length ? comments.map(c => `
          <div class="bg-zinc-900 rounded-2xl p-4">
            <div class="flex justify-between text-sm mb-1">
              <span class="text-orange-400">@${c.nickname}</span>
              <span class="text-zinc-500">${c.time}</span>
            </div>
            <p>${c.text}</p>
          </div>
        `).join('') : `<p class="text-zinc-500 text-center py-8">Пока нет комментариев. Будь первым!</p>`;
      } catch (e) {}
    }

    function sendComment() {
      const nickname = document.getElementById('nicknameInput').value.trim() || 'Аноним';
      const text = document.getElementById('commentInput').value.trim();
      
      if (!text) return;

      Telegram.WebApp.sendData(JSON.stringify({
        action: "add_comment",
        content_id: currentContentId,
        nickname: nickname,
        text: text
      }));

      // Очищаем форму и обновляем список
      document.getElementById('commentInput').value = '';
      setTimeout(loadComments, 800);
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
      currentContentId = null;
    }

    function sponsor() {
      Telegram.WebApp.openTelegramLink(`https://t.me/${window.personalUsername || 'твой_юзернейм'}?start=donate`);
    }

    function filterStars() {
      const term = document.getElementById('searchInput').value.toLowerCase();
      const cards = document.querySelectorAll('#starsGrid > div');
      cards.forEach(card => {
        const name = card.textContent.toLowerCase();
        card.style.display = name.includes(term) ? 'block' : 'none';
      });
    }

    // Автозапуск
    window.onload = () => {
      Telegram.WebApp.ready();
      Telegram.WebApp.expand();
      switchTab(0);
    };
  </script>
</body>
</html>
